<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>四柱推命パーソナルツール</title>
  <meta http-equiv="refresh" content="0; url=../">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f4;
      --card: #ffffff;
      --line: rgba(0, 0, 0, 0.1);
      --text: #1a1a1a;
      --sub: #6b6b6b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .panel {
      width: min(100%, 520px);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      padding: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.15rem;
    }

    p {
      margin: 0;
      color: var(--sub);
      line-height: 1.6;
      font-size: 0.94rem;
    }

    a {
      color: inherit;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>四柱推命パーソナルツールへ移動します</h1>
    <p><a href="../">移動しない場合はこちらを開いてください。</a></p>
  </main>
</body>
</html>
